openapi: 3.1.0
info:
  title: Test API
  version: 1.0.0
  description: Test OpenAPI specification for NetGet OpenAPI client E2E tests
servers:
  - url: http://127.0.0.1:{port}
    description: Test server (port injected at runtime)
paths:
  /users:
    get:
      operationId: listUsers
      summary: List all users
      description: Returns a list of all users in the system
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
  /users/{id}:
    get:
      operationId: getUser
      summary: Get user by ID
      description: Returns details for a specific user
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
  /users/search:
    get:
      operationId: searchUsers
      summary: Search users
      description: Search for users by name
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of results
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /users/create:
    post:
      operationId: createUser
      summary: Create a new user
      description: Creates a new user in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
