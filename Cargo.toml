[package]
name = "netget"
version = "0.1.0"
edition = "2021"

[features]
default = ["all-protocols"]
tcp = ["async-trait"]
http = []
udp = []
dns = ["hickory-server", "hickory-proto"]
dhcp = ["dhcproto"]
ntp = []  # NTP uses only standard UDP, no extra deps
snmp = ["rasn-snmp", "rasn"]
ssh = ["russh", "russh-keys", "russh-sftp", "async-trait"]
irc = []  # IRC uses only TCP, no extra deps
telnet = ["nectar"]
smtp = ["rust-smtp-server"]
mdns = ["mdns-sd"]
mysql = ["dep:opensrv-mysql", "async-trait"]
ipp = ["dep:ipp"]
postgresql = ["dep:pgwire", "async-trait"]
redis = ["dep:redis-protocol"]
proxy = ["http-mitm-proxy", "rcgen", "tokio-native-tls", "native-tls"]
webdav = ["dav-server"]
nfs = ["nfsserve"]
cassandra = ["dep:cassandra-protocol", "tcp"]
smb = ["smb-msg"]
stun = ["dep:webrtc-stun"]
turn = ["dep:webrtc-turn"]
ldap = ["dep:ldap3_proto", "rasn"]
imap = ["imap-codec"]  # IMAP uses imap-codec for protocol parsing
socks5 = []  # SOCKS5 uses only TCP, no extra deps
elasticsearch = []  # Elasticsearch uses only HTTP, no extra deps
dynamo = []  # DynamoDB uses only HTTP, no extra deps
openai = []  # OpenAI API uses only HTTP, no extra deps
wireguard = ["defguard_wireguard_rs", "x25519-dalek"]  # Full WireGuard VPN server with LLM control
openvpn = []  # OpenVPN honeypot (packet detection only, no full crypto)
ipsec = []  # IPSec/IKEv2 honeypot (packet detection only, no full crypto)
bgp = ["netgauze-bgp-pkt"]  # BGP routing protocol
all-protocols = ["tcp", "http", "udp", "dns", "dhcp", "ntp", "snmp", "ssh", "irc", "telnet", "smtp", "mdns", "mysql", "ipp", "postgresql", "redis", "proxy", "webdav", "nfs", "cassandra", "smb", "stun", "turn", "ldap", "imap", "socks5", "elasticsearch", "dynamo", "openai", "wireguard", "openvpn", "ipsec", "bgp"]
# E2E testing feature - marker to enable end-to-end black-box tests
e2e-tests = []

[dependencies]
# Async runtime
tokio = { version = "1.41", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }

# Terminal UI - using crossterm for rolling terminal
crossterm = { version = "0.28", features = ["event-stream"] }
futures = "0.3"
textwrap = "0.16"

# HTTP client for Ollama
reqwest = { version = "0.12", features = ["json"] }

# Ollama Rust client
ollama-rs = "0.3"

# HTTP server
hyper = { version = "1.5", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Byte manipulation
bytes = "1.8"
hex = "0.4"

# Socket options (SO_REUSEADDR)
socket2 = "0.5"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Syntax highlighting for script code
syntect = "5.3"

# Utilities
chrono = "0.4"
regex = "1.11"
urlencoding = "2.1"
html2text = "0.12"

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

# Home directory
dirs = "5.0"

# Packet capture (libpcap)
pcap = "2.2"

# DNS server (Hickory DNS, formerly Trust-DNS)
hickory-server = { version = "0.24", optional = true }
hickory-proto = { version = "0.24", optional = true }

# DHCP server
dhcproto = { version = "0.12", optional = true }

# SNMP agent
rasn-snmp = { version = "0.18", optional = true }
rasn = { version = "0.18", optional = true }

# SSH server
russh = { version = "0.45", optional = true }
russh-keys = { version = "0.45", optional = true }
russh-sftp = { version = "2.1", optional = true }
async-trait = { version = "0.1", optional = true }

# Telnet server
nectar = { version = "0.4", optional = true }

# SMTP server
rust-smtp-server = { version = "0.1", optional = true }

# mDNS/DNS-SD service discovery
mdns-sd = { version = "0.15", optional = true }

# MySQL server
opensrv-mysql = { version = "0.7", optional = true }

# IPP (Internet Printing Protocol)
ipp = { version = "5.3", optional = true }

# PostgreSQL server
pgwire = { version = "0.25", optional = true }

# Redis server (RESP protocol)
redis-protocol = { version = "6.0", optional = true }

# HTTP Proxy (MITM)
http-mitm-proxy = { version = "0.16", optional = true }
rcgen = { version = "0.13", optional = true }  # For certificate generation
tokio-native-tls = { version = "0.3", optional = true }
native-tls = { version = "0.2", optional = true }

# WebDAV server
dav-server = { version = "0.8", optional = true }

# NFS server
nfsserve = { version = "0.10", optional = true }

# Cassandra/CQL server
cassandra-protocol = { version = "3.3", optional = true }

# SMB server (message parsing)
smb-msg = { version = "0.10", optional = true }

# STUN server (Session Traversal Utilities for NAT)
webrtc-stun = { version = "0.1", optional = true }

# TURN server (Traversal Using Relays around NAT)
webrtc-turn = { version = "0.1", optional = true }

# LDAP server (ASN.1 BER encoding for LDAP protocol)
ldap3_proto = { version = "0.3", optional = true }
# rasn is already included via snmp feature, but we explicitly depend on it for LDAP too

# IMAP server (IMAP protocol parsing)
imap-codec = { version = "2.0.0-alpha.6", optional = true }

# BGP server (Border Gateway Protocol)
netgauze-bgp-pkt = { version = "0.7", optional = true, features = ["serde", "codec"] }

# WireGuard VPN server (full implementation with LLM control)
defguard_wireguard_rs = { version = "0.7", optional = true, features = ["serde"] }
x25519-dalek = { version = "2.0", optional = true }  # For WireGuard key generation

[dev-dependencies]
# For async tests
tokio-test = "0.4"
# For e2e test setup/teardown
ctor = "0.2"

# Terminal snapshot testing
pty-process = "0.4"
vt100 = "0.15"

# E2E test dependencies (only used when e2e-tests feature is enabled via test files' cfg gates)
# FTP client for e2e integration tests
suppaftp = "6.0"
# For process management in e2e tests (Unix signals) and PTY window size
nix = { version = "0.29", features = ["signal", "process", "term", "ioctl"] }
# SNMP client for e2e integration tests
snmp = "0.2"
# DNS client for e2e integration tests (Hickory DNS, formerly Trust-DNS)
hickory-client = "0.24"
# NTP client for e2e integration tests
rsntp = "4.0"
# SSH client for e2e integration tests
ssh2 = "0.9"
# IRC client for e2e integration tests
irc = "1.1"
# SMTP client for e2e integration tests
lettre = "0.11"
# MySQL client for e2e integration tests
mysql_async = "0.34"
# PostgreSQL client for e2e integration tests
tokio-postgres = "0.7"
# Redis client for e2e integration tests
redis = { version = "0.27", features = ["tokio-comp"] }
# WebDAV client for e2e integration tests
reqwest_dav = "0.2"
# NFS client for e2e integration tests
nfs3_client = "0.7"
# Cassandra/CQL client for e2e integration tests
scylla = "1.3"
# LDAP client for e2e integration tests
ldap3 = "0.11"
# IMAP client for e2e integration tests
async-imap = "0.11"
async-native-tls = "0.5"
# AWS SDK for DynamoDB e2e integration tests
aws-config = { version = "1.5", features = ["behavior-version-latest"] }
aws-sdk-dynamodb = "1.52"
# Axum for creating test HTTP servers in proxy e2e tests
axum = "0.7"
# Axum server with TLS support for HTTPS test servers
axum-server = { version = "0.6", features = ["tls-rustls"] }
# OpenAI client for e2e integration tests
async-openai = "0.26"
