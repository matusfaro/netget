[package]
name = "netget"
version = "0.1.0"
edition = "2021"

[features]
default = ["all-protocols"]
tcp = []
http = []
udp = []
dns = ["hickory-server", "hickory-proto"]
dhcp = ["dhcproto"]
ntp = []  # NTP uses only standard UDP, no extra deps
snmp = ["rasn-snmp", "rasn"]
ssh = ["russh", "russh-keys", "russh-sftp", "async-trait"]
irc = []  # IRC uses only TCP, no extra deps
all-protocols = ["tcp", "http", "udp", "dns", "dhcp", "ntp", "snmp", "ssh", "irc"]
# E2E testing feature - marker to enable end-to-end black-box tests
e2e-tests = []

[dependencies]
# Async runtime
tokio = { version = "1.41", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }

# Terminal UI - using ratatui for TUI
ratatui = { version = "0.29", features = ["crossterm"] }
crossterm = { version = "0.28", features = ["event-stream"] }
futures = "0.3"
tui-textarea = "0.7"

# HTTP client for Ollama
reqwest = { version = "0.12", features = ["json"] }

# Ollama Rust client
ollama-rs = "0.3"

# HTTP server
hyper = { version = "1.5", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "0.8"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Byte manipulation
bytes = "1.8"
hex = "0.4"

# Socket options (SO_REUSEADDR)
socket2 = "0.5"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
chrono = "0.4"

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

# Home directory
dirs = "5.0"

# Packet capture (libpcap)
pcap = "2.2"

# DNS server (Hickory DNS, formerly Trust-DNS)
hickory-server = { version = "0.24", optional = true }
hickory-proto = { version = "0.24", optional = true }

# DHCP server
dhcproto = { version = "0.12", optional = true }

# SNMP agent
rasn-snmp = { version = "0.18", optional = true }
rasn = { version = "0.18", optional = true }

# SSH server
russh = { version = "0.45", optional = true }
russh-keys = { version = "0.45", optional = true }
russh-sftp = { version = "2.1", optional = true }
async-trait = { version = "0.1", optional = true }

[dev-dependencies]
# For async tests
tokio-test = "0.4"
# For e2e test setup/teardown
ctor = "0.2"

# E2E test dependencies (only used when e2e-tests feature is enabled via test files' cfg gates)
# FTP client for e2e integration tests
suppaftp = "6.0"
# For process management in e2e tests (Unix signals)
nix = { version = "0.29", features = ["signal", "process"] }
# SNMP client for e2e integration tests
snmp = "0.2"
# DNS client for e2e integration tests (Hickory DNS, formerly Trust-DNS)
hickory-client = "0.24"
# NTP client for e2e integration tests
rsntp = "4.0"
# SSH client for e2e integration tests
ssh2 = "0.9"
# IRC client for e2e integration tests
irc = "1.1"
